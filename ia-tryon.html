<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-6xl mx-auto py-24 px-6">
    <h1 class="text-4xl font-bold text-center mb-12">Simulador de Visagismo <span class="text-amber-500">Prumo</span></h1>

    <div class="grid md:grid-cols-2 gap-12">
      <div>
        <div id="drop-zone" class="border-2 border-dashed border-zinc-700 rounded-3xl p-10 text-center hover:border-amber-500 transition cursor-pointer bg-zinc-900/50">
          <input type="file" id="photo-upload" class="hidden" accept="image/*">
          <div id="upload-placeholder">
            <span class="text-5xl">👤</span>
            <p class="mt-4 text-zinc-400">Clique ou arraste sua foto de frente</p>
          </div>
          <img id="preview-img" class="hidden w-full rounded-2xl shadow-lg">
        </div>
      </div>

      <div id="controls" class="space-y-8">
        <div>
          <h3 class="text-xl font-semibold mb-4">1. Estilos Clássicos</h3>
          <div class="grid grid-cols-2 gap-4">
            <button onclick="applyStyle('Slick Back')" class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 hover:border-amber-500 text-left transition">
              <p class="font-bold">Slick Back</p>
              <p class="text-xs text-zinc-500">Penteado para trás</p>
            </button>
            <button onclick="applyStyle('Side Part')" class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 hover:border-amber-500 text-left transition">
              <p class="font-bold">Side Part</p>
              <p class="text-xs text-zinc-500">Divisão lateral</p>
            </button>
          </div>
        </div>

        <div>
          <h3 class="text-xl font-semibold mb-4 text-amber-500">2. Estilos Modernos</h3>
          <div class="grid grid-cols-2 gap-4">
            <button onclick="applyStyle('Mid Fade')" class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 hover:border-amber-500 text-left transition">
              <p class="font-bold">Mid Fade</p>
              <p class="text-xs text-zinc-500">Degradê médio</p>
            </button>
            <button onclick="applyStyle('Buzz Cut')" class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 hover:border-amber-500 text-left transition">
              <p class="font-bold">Buzz Cut</p>
              <p class="text-xs text-zinc-500">Raspado moderno</p>
            </button>
          </div>
        </div>

        <div id="result-box" class="hidden p-6 bg-amber-600/10 border border-amber-600/30 rounded-2xl animate-pulse">
            <p class="text-amber-500 font-bold">IA Analisando...</p>
            <p class="text-sm">Aplicando <span id="style-name"></span> ao seu rosto.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadInput = document.getElementById('photo-upload');
    const dropZone = document.getElementById('drop-zone');
    const previewImg = document.getElementById('preview-img');
    const placeholder = document.getElementById('upload-placeholder');

    dropZone.onclick = () => uploadInput.click();

    uploadInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          previewImg.src = event.target.result;
          previewImg.classList.remove('hidden');
          placeholder.classList.add('hidden');
        };
        reader.readAsDataURL(file);
      }
    };

    function applyStyle(name) {
        if(!previewImg.src) {
            alert("Por favor, envie sua foto primeiro!");
            return;
        }
        document.getElementById('result-box').classList.remove('hidden');
        document.getElementById('style-name').innerText = name;
        
        // Simulação de IA - Em 2 segundos avisa que está pronto
        setTimeout(() => {
            alert("Simulação para " + name + " pronta! Agende seu horário para realizar esse corte.");
            window.location.href = "contato.html";
        }, 2000);
    }
  </script>
</body>
