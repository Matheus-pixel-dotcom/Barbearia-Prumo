<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Try-On - Estúdio Prumo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-detection"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-6xl mx-auto py-12 px-6">
    <h1 class="text-5xl font-bold text-center mb-4">Experimente seu novo corte com IA</h1>
    <p class="text-center text-zinc-400 mb-12">Faça upload da sua foto e escolha o estilo</p>

    <div class="grid md:grid-cols-2 gap-10">
      <!-- Upload + Preview -->
      <div>
        <div id="upload-area" class="border-2 border-dashed border-zinc-700 rounded-3xl h-96 flex flex-col items-center justify-center cursor-pointer hover:border-amber-500 transition">
          <input type="file" id="photo-upload" accept="image/*" class="hidden">
          <p class="text-2xl mb-4">📸</p>
          <p>Envie sua foto (frente, boa iluminação)</p>
        </div>

        <div id="preview-original" class="hidden mt-6">
          <h3 class="text-lg mb-3">Sua foto atual</h3>
          <img id="original-img" class="rounded-2xl w-full">
        </div>
      </div>

      <!-- Resultado + Seleção de cortes -->
      <div>
        <div class="mb-6">
          <h3 class="text-lg mb-3">Escolha o estilo</h3>
          <div class="grid grid-cols-4 gap-3" id="style-grid">
            <!-- Preenchido por JS com imagens de cortes -->
          </div>
        </div>

        <div id="result-area" class="hidden">
          <h3 class="text-lg mb-3">Prévia com IA</h3>
          <img id="result-img" class="rounded-2xl w-full shadow-2xl">
          
          <div class="flex gap-4 mt-8">
            <button onclick="approveCut()" class="flex-1 bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-semibold">
              Aprovar este corte
            </button>
            <button onclick="tryAgain()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-semibold">
              Tentar outro
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/tryon.js"></script>
</body>
</html>
