<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Barbearia Estilo Fino</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
    }

    header {
      background: #000;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #c59d5f;
    }

    header h1 {
      margin: 0;
      color: #c59d5f;
    }

    nav {
      text-align: center;
      margin-top: 10px;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #c59d5f;
    }

    .banner {
      background: url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70') no-repeat center/cover;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .banner h2 {
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 5px;
    }

    .container {
      padding: 40px;
      text-align: center;
    }

    .servicos {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      border: 1px solid #c59d5f;
    }

    button {
      background: #c59d5f;
      border: none;
      padding: 10px 20px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #a37c3f;
    }

    footer {
      background: #000;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      border-top: 2px solid #c59d5f;
    }
  </style>
</head>
<body>

  <header>
    <h1>💈 Barbearia Estilo Fino</h1>
    <nav>
      <a href="#servicos">Serviços</a>
      <a href="#agendamento">Agendar</a>
      <a href="#contato">Contato</a>
    </nav>
  </header>

  <section class="banner">
    <h2>Seu estilo começa aqui</h2>
  </section>

  <section class="container" id="servicos">
    <h2>Serviços</h2>
    <div class="servicos">
      <div class="card">
        <h3>Corte</h3>
        <p>R$ 40</p>
      </div>
      <div class="card">
        <h3>Barba</h3>
        <p>R$ 30</p>
      </div>
      <div class="card">
        <h3>Corte + Barba</h3>
        <p>R$ 60</p>
      </div>
    </div>
  </section>

  <section class="container" id="agendamento">
    <h2>Agende seu horário</h2>
    <button onclick="agendar()">Agendar agora</button>
  </section>

  <footer id="contato">
    <p>📍 Rua Exemplo, 123 - São Paulo</p>
    <p>📞 (11) 99999-9999</p>
  </footer>

  <script>
    function agendar() {
      alert("Agendamento realizado com sucesso! Entraremos em contato.");
    }
  </script>

</body>
</html>
