<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cadastro - Estúdio Prumo: Crie sua conta para agendar e acompanhar seus cortes.">
  <title>Cadastro | Estúdio Prumo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .signup-container {
      min-height: calc(100vh - 78px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .signup-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .signup-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .signup-header h1 {
      font-size: 28px;
      margin: 0 0 8px 0;
      color: var(--gold-2);
    }

    .signup-header p {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
      color: var(--text);
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .form-group input::placeholder {
      color: var(--muted-2);
    }

    .signup-btn {
      width: 100%;
      padding: 12px 16px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .signup-btn:hover {
      background: var(--gold-2);
    }

    .signup-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    .login-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      color: var(--gold-2);
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="navbar container" aria-label="Navegação principal">
      <a class="brand" href="index.html" aria-label="Estúdio Prumo - início"><span class="brand-mark">P</span>Estúdio Prumo</a>
      <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Abrir menu">Menu</button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">Início</a>
        <a href="servicos.html">Serviços</a>
        <a href="ia-tryon.html">Experimente com IA</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
        <a class="btn btn-primary" href="login.html">Login</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="signup-container">
      <div class="signup-card">
        <div class="signup-header">
          <h1>Crie sua conta</h1>
          <p>Junte-se ao Estúdio Prumo</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="signupForm">
          <div class="form-group">
            <label for="fullName">Nome completo</label>
            <input 
              type="text" 
              id="fullName" 
              name="fullName" 
              placeholder="Seu nome" 
              required
            >
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="seu@email.com" 
              required
            >
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Mínimo 6 caracteres" 
              required
              minlength="6"
            >
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmar senha</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword" 
              placeholder="Confirme sua senha" 
              required
              minlength="6"
            >
          </div>

          <button type="submit" class="signup-btn" id="submitBtn">Criar conta</button>
        </form>

        <div class="login-link">
          Já tem conta? <a href="login.html">Faça login</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Estúdio Prumo — Técnica, ordem e estilo.</div>
  </footer>

  <script src="supabase-client.js" defer></script>
  <script src="script.js" defer></script>
  <script src="auth.js" defer></script>
</body>
</html>
